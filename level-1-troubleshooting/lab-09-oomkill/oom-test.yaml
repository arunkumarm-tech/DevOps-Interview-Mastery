apiVersion: v1
kind: Pod
metadata:
  name: oom-killer-demo
spec:
  containers:
  - name: memory-hog
    image: polinux/stress
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "20M", "--vm-hang", "1"] 
    resources:
      limits:
        memory: "10Mi"  # The limit (ceiling)
      requests:
        memory: "5Mi"   # The request (guarantee)