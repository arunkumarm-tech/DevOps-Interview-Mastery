apiVersion: v1
kind: Pod
metadata:
  name: oom-killer-demo
spec:
  containers:
  - name: memory-hog
    image: polinux/stress
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "20M", "--vm-hang", "1"] 
    resources:
      limits:
        memory: "30Mi"  # Increased from 10Mi to 30Mi (now it can handle the 20Mi stress)
      requests:
        memory: "20Mi"  # Increased from 5Mi to 20Mi to guarantee the space